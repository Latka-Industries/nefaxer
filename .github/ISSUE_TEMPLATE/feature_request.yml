name: Feature request
description: Suggest an improvement to indexing, diffing, the CLI, or the library API
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you're trying to solve. Nefaxer focuses on fast directory indexing, snapshot diffing, and optional content hashing — not general backup or sync tooling.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / flags
        - Library API (`nefax_dir`, tuning, streaming)
        - Indexing pipeline (walk, metadata, hashing)
        - SQLite index / `.nefaxer` format
        - Diff / change detection
        - Configuration (`.nefaxer.toml`, exclude patterns)
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to accomplish? What's painful or missing today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: How should it work? CLI flags, API shape, or workflow is helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, workarounds, or designs you've thought about

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: I'm willing to open a PR for this
        - label: This would be useful for UBLX / downstream integrators
